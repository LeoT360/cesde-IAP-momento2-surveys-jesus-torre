<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">INICIO</a></li>
                <li><a href="survey.html">ENCUESTA</a></li>
                <li><a href="contact-us.html">CONTACTO</a></li>
            </ul>
        </nav>
        <h1>Survey</h1>
    </header>

    <main>
        <section>
            <h2>Contáctanos</h2>
            <form action="#" method="post">
                <article>
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </article>

                <article>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </article>

                <article>
                    <p>Perfil profesional:</p>
                    <input type="radio" id="est" name="perfil" value="estudiante">
                    <label for="est" class="label-inline">Estudiante</label>
                    <input type="radio" id="pro" name="perfil" value="profesional">
                    <label for="pro" class="label-inline">Profesional</label>
                </article>

                <article>
                    <p>Intereses:</p>
                    <input type="checkbox" id="ia" name="interes" value="ia">
                    <label for="ia" class="label-inline">IA</label>
                    <input type="checkbox" id="web" name="interes" value="web">
                    <label for="web" class="label-inline">Web</label>
                </article>

                <article>
                    <label for="pais">País:</label>
                    <select id="pais" name="pais">
                        <option value="ven">Venezuela</option>
                        <option value="col">Colombia</option>
                        <option value="bra">Brasil</option>
                        <option value="arg">Argentina</option>
                        <option value="per">Perú</option>
                        <option value="mex">México</option>
                    </select>
                </article>

                <article>
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4"></textarea>
                </article>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Jesús Leonardo Torre Melgarejo - 2026 - Introducción a la Programación</p>
        <p>Proyecto académico sin frameworks – 2026 Momento 2</p>
    </footer>
</body>
</html>
